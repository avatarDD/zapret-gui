# ═══════════════════════════════════════════════════════════════
# build-awg-binaries.yml — Кросс-компиляция amneziawg-go и
# amneziawg-tools под архитектуры роутеров.
#
# Способы запустить релиз:
#   1. Автоматически: cron раз в сутки проверяет апстрим и
#      создаёт наш тэг awg-bin-go-<X>-tools-<Y>, если в апстриме
#      появилась новая версия. Workflow на этот тэг сам
#      опубликует релиз.
#   2. Через веб-интерфейс GitHub: Releases → Draft new release →
#      Choose a tag → ввести новое имя вида awg-bin-vN → Publish.
#   3. Вручную: workflow_dispatch с явным publish_release=true.
# ═══════════════════════════════════════════════════════════════

name: Build AWG binaries

on:
  workflow_dispatch:
    inputs:
      awg_go_ref:
        description: 'amneziawg-go git ref (tag/branch/sha). Пусто = последний релиз.'
        required: false
        default: ''
      awg_tools_ref:
        description: 'amneziawg-tools git ref. Пусто = последний релиз.'
        required: false
        default: ''
      publish_release:
        description: 'Опубликовать GitHub Release (true/false)'
        required: false
        default: 'true'
  push:
    tags:
      - 'awg-bin-*'
  schedule:
    # Ежедневно 06:00 UTC — авто-детект новых апстрим-версий
    - cron: '0 6 * * *'

permissions:
  contents: write

env:
  AWG_GO_REPO: amnezia-vpn/amneziawg-go
  AWG_TOOLS_REPO: amnezia-vpn/amneziawg-tools

jobs:
  # ── 0. Авто-детект новых версий апстрима (только cron) ─────
  # Если появилась новая комбинация версий go/tools, которой ещё
  # нет среди наших тэгов, — создаём тэг и выходим. Push тэга
  # триггерит этот же workflow по ветке `on: push: tags`.
  auto-tag:
    name: Auto-tag on upstream release
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect & maybe tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          resolve_latest() {
            local repo="$1"
            local out
            if out=$(gh api "repos/$repo/releases/latest" --jq '.tag_name' 2>/dev/null); then
              echo "$out"; return
            fi
            if out=$(gh api "repos/$repo/tags" --jq '.[0].name' 2>/dev/null); then
              echo "$out"; return
            fi
            echo "main"
          }

          GO_REF=$(resolve_latest "$AWG_GO_REPO")
          TOOLS_REF=$(resolve_latest "$AWG_TOOLS_REPO")
          GO_VER="${GO_REF#v}"
          TOOLS_VER="${TOOLS_REF#v}"

          # Чистим версию, оставляем безопасные символы для тэга
          sanitize() { echo "$1" | tr -c 'A-Za-z0-9._-' '-'; }
          GO_S=$(sanitize "$GO_VER")
          TOOLS_S=$(sanitize "$TOOLS_VER")

          NEW_TAG="awg-bin-go-${GO_S}-tools-${TOOLS_S}"
          echo "Upstream go=$GO_VER tools=$TOOLS_VER → tag=$NEW_TAG"

          if git rev-parse "refs/tags/$NEW_TAG" >/dev/null 2>&1 \
             || gh api "repos/${{ github.repository }}/git/refs/tags/$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG уже существует — пропускаем"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Auto: amneziawg-go=$GO_VER amneziawg-tools=$TOOLS_VER"
          git push origin "$NEW_TAG"
          echo "Создан и запушен тэг $NEW_TAG — он триггернёт релизный run"

  # ── 1. Определить версии (для всех остальных триггеров) ────
  resolve-versions:
    name: Resolve upstream versions
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    outputs:
      awg_go_ref: ${{ steps.resolve.outputs.awg_go_ref }}
      awg_tools_ref: ${{ steps.resolve.outputs.awg_tools_ref }}
      awg_go_version: ${{ steps.resolve.outputs.awg_go_version }}
      awg_tools_version: ${{ steps.resolve.outputs.awg_tools_version }}
    steps:
      - name: Resolve refs
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          GO_REF="${{ inputs.awg_go_ref }}"
          TOOLS_REF="${{ inputs.awg_tools_ref }}"

          # Если запущено по тэгу awg-bin-go-<X>-tools-<Y>, парсим версии из тэга
          if [ -z "$GO_REF" ] || [ -z "$TOOLS_REF" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" =~ ^awg-bin-go-(.+)-tools-(.+)$ ]]; then
              [ -z "$GO_REF" ]    && GO_REF="v${BASH_REMATCH[1]}"
              [ -z "$TOOLS_REF" ] && TOOLS_REF="v${BASH_REMATCH[2]}"
              echo "Versions parsed from tag $TAG"
            fi
          fi

          resolve_latest() {
            local repo="$1"
            local out
            if out=$(gh api "repos/$repo/releases/latest" --jq '.tag_name' 2>/dev/null); then
              echo "$out"; return
            fi
            if out=$(gh api "repos/$repo/tags" --jq '.[0].name' 2>/dev/null); then
              echo "$out"; return
            fi
            echo "main"
          }

          [ -z "$GO_REF" ]    && GO_REF=$(resolve_latest "$AWG_GO_REPO")
          [ -z "$TOOLS_REF" ] && TOOLS_REF=$(resolve_latest "$AWG_TOOLS_REPO")

          # Если в тэге была "1.2.3" а в репо тэг "v1.2.3" — корректируем
          fix_ref() {
            local repo="$1" ref="$2"
            if gh api "repos/$repo/git/refs/tags/$ref" >/dev/null 2>&1; then
              echo "$ref"; return
            fi
            if [[ "$ref" != v* ]] \
               && gh api "repos/$repo/git/refs/tags/v$ref" >/dev/null 2>&1; then
              echo "v$ref"; return
            fi
            echo "$ref"
          }
          GO_REF=$(fix_ref "$AWG_GO_REPO" "$GO_REF")
          TOOLS_REF=$(fix_ref "$AWG_TOOLS_REPO" "$TOOLS_REF")

          GO_VER="${GO_REF#v}"
          TOOLS_VER="${TOOLS_REF#v}"

          echo "awg_go_ref=$GO_REF"            >> "$GITHUB_OUTPUT"
          echo "awg_tools_ref=$TOOLS_REF"      >> "$GITHUB_OUTPUT"
          echo "awg_go_version=$GO_VER"        >> "$GITHUB_OUTPUT"
          echo "awg_tools_version=$TOOLS_VER"  >> "$GITHUB_OUTPUT"

          echo "── Resolved ──"
          echo "amneziawg-go    : $GO_REF (version $GO_VER)"
          echo "amneziawg-tools : $TOOLS_REF (version $TOOLS_VER)"

  # ── 2. Сборка amneziawg-go ──────────────────────────────────
  build-awg-go:
    name: Build amneziawg-go (${{ matrix.arch_name }})
    runs-on: ubuntu-latest
    needs: resolve-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_name: mipsel-softfloat
            goos: linux
            goarch: mipsle
            gomips: softfloat
          - arch_name: mips-softfloat
            goos: linux
            goarch: mips
            gomips: softfloat
          - arch_name: aarch64
            goos: linux
            goarch: arm64
          - arch_name: armv7
            goos: linux
            goarch: arm
            goarm: '7'
          - arch_name: x86_64
            goos: linux
            goarch: amd64

    steps:
      - name: Checkout amneziawg-go
        uses: actions/checkout@v4
        with:
          repository: ${{ env.AWG_GO_REPO }}
          ref: ${{ needs.resolve-versions.outputs.awg_go_ref }}
          path: src

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build
        working-directory: src
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          go env GOOS GOARCH GOMIPS GOARM
          # Бинарь обычно собирается через make; fallback — go build
          if [ -f Makefile ] && grep -qE '^(build|amneziawg-go):' Makefile; then
            make || go build -ldflags="-s -w" -trimpath -o amneziawg-go .
          else
            go build -ldflags="-s -w" -trimpath -o amneziawg-go .
          fi
          ls -lh amneziawg-go
          file amneziawg-go || true

      - name: Package
        run: |
          set -euo pipefail
          VER="${{ needs.resolve-versions.outputs.awg_go_version }}"
          ARCH="${{ matrix.arch_name }}"
          mkdir -p package
          cp src/amneziawg-go package/
          (cd package && tar czf "../amneziawg-go-${VER}-${ARCH}.tar.gz" amneziawg-go)
          sha256sum "amneziawg-go-${VER}-${ARCH}.tar.gz" \
            > "amneziawg-go-${VER}-${ARCH}.tar.gz.sha256"
          ls -lh amneziawg-go-*.tar.gz*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: awg-go-${{ matrix.arch_name }}
          path: |
            amneziawg-go-*.tar.gz
            amneziawg-go-*.tar.gz.sha256
          retention-days: 14

  # ── 3. Сборка amneziawg-tools ───────────────────────────────
  build-awg-tools:
    name: Build amneziawg-tools (${{ matrix.arch_name }})
    runs-on: ubuntu-latest
    needs: resolve-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          # Bootlin slug → tarball arch directory.
          # tc_arch          — каталог архитектуры на toolchains.bootlin.com
          # Подкаталог bin/ внутри тулчейна содержит правильный triplet,
          # который мы определяем динамически (см. шаг "Detect triplet").
          - arch_name: mipsel-softfloat
            tc_arch: mips32el
          - arch_name: mips-softfloat
            tc_arch: mips32
          - arch_name: aarch64
            tc_arch: aarch64
          - arch_name: armv7
            tc_arch: armv7-eabihf
          - arch_name: x86_64
            tc_arch: x86-64

    env:
      BOOTLIN_VERSION: '2024.05-1'

    steps:
      - name: Checkout amneziawg-tools
        uses: actions/checkout@v4
        with:
          repository: ${{ env.AWG_TOOLS_REPO }}
          ref: ${{ needs.resolve-versions.outputs.awg_tools_ref }}
          path: tools-src

      - name: Download Bootlin musl toolchain (${{ matrix.tc_arch }})
        env:
          TC_ARCH: ${{ matrix.tc_arch }}
        run: |
          set -euo pipefail
          BASE="https://toolchains.bootlin.com/downloads/releases/toolchains/${TC_ARCH}/tarballs"
          # Список кандидатов — пробуем последовательно, пока один не скачается.
          # Если апстрим обновит версии — поменяем сверху BOOTLIN_VERSION.
          CANDIDATES=(
            "${TC_ARCH}--musl--stable-${BOOTLIN_VERSION}.tar.xz"
            "${TC_ARCH}--musl--stable-2024.02-1.tar.xz"
            "${TC_ARCH}--musl--stable-2023.11-1.tar.xz"
          )
          mkdir -p "$HOME/tc"
          cd "$HOME/tc"
          ok=0
          for c in "${CANDIDATES[@]}"; do
            echo "── try $BASE/$c"
            if curl -fsSL --retry 3 --retry-delay 5 -o "$c" "$BASE/$c"; then
              echo "✓ скачано: $c"
              tar xf "$c"
              ok=1
              break
            fi
          done
          if [ "$ok" = "0" ]; then
            echo "Не удалось скачать toolchain для $TC_ARCH из Bootlin" >&2
            exit 1
          fi

          # Каталог тулчейна: <arch>--musl--stable-<ver>/
          TC_DIR=$(ls -d "$HOME/tc/${TC_ARCH}--musl--stable-"*/ | head -1)
          TC_DIR="${TC_DIR%/}"
          echo "TC_DIR=$TC_DIR" >> "$GITHUB_ENV"
          echo "── содержимое bin/"
          ls "$TC_DIR/bin/"
          echo "$TC_DIR/bin" >> "$GITHUB_PATH"

      - name: Detect triplet
        run: |
          set -euo pipefail
          # Имена в bin/ вида <triplet>-gcc — отсюда вытягиваем триплет
          GCC=$(ls "$TC_DIR/bin/" | grep -E -- '-gcc$' | head -1)
          TRIPLET="${GCC%-gcc}"
          echo "TRIPLET=$TRIPLET"
          echo "TRIPLET=$TRIPLET" >> "$GITHUB_ENV"
          # Sysroot — стандартный путь в Bootlin тулчейне
          SYSROOT="$TC_DIR/$TRIPLET/sysroot"
          if [ ! -d "$SYSROOT" ]; then
            # Альтернативное расположение
            SYSROOT=$(find "$TC_DIR" -maxdepth 4 -type d -name 'sysroot' | head -1)
          fi
          echo "SYSROOT=$SYSROOT"
          echo "SYSROOT=$SYSROOT" >> "$GITHUB_ENV"
          "$TC_DIR/bin/$TRIPLET-gcc" --version

      - name: Build libmnl (static)
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 -o libmnl.tar.bz2 \
            https://www.netfilter.org/projects/libmnl/files/libmnl-1.0.5.tar.bz2
          tar xjf libmnl.tar.bz2
          cd libmnl-1.0.5

          export CC="${TRIPLET}-gcc"
          export AR="${TRIPLET}-ar"
          export RANLIB="${TRIPLET}-ranlib"
          export STRIP="${TRIPLET}-strip"

          if ! ./configure --host="$TRIPLET" \
                           --prefix="$GITHUB_WORKSPACE/libmnl-prefix" \
                           --enable-static --disable-shared; then
            echo "── config.log (последние 200 строк) ──"
            tail -n 200 config.log || true
            exit 1
          fi
          make -j"$(nproc)"
          make install
          echo "── libmnl-prefix ──"
          ls -lh "$GITHUB_WORKSPACE/libmnl-prefix/lib/" || true
          ls -lh "$GITHUB_WORKSPACE/libmnl-prefix/include/" || true

      - name: Build amneziawg-tools (awg)
        working-directory: tools-src/src
        run: |
          set -euo pipefail
          PREFIX="$GITHUB_WORKSPACE/libmnl-prefix"

          export CC="${TRIPLET}-gcc"
          export AR="${TRIPLET}-ar"
          export RANLIB="${TRIPLET}-ranlib"
          export STRIP="${TRIPLET}-strip"
          export CFLAGS="-O2 -I${PREFIX}/include"
          export LDFLAGS="-static -L${PREFIX}/lib"
          export LDLIBS="-lmnl"
          export PKG_CONFIG_PATH="${PREFIX}/lib/pkgconfig"

          ls -la
          # Цели "awg" нет — форк использует дефолтный target (wg).
          # Explicit targets пробуем по убыванию: wg, all.
          make WITH_BASHCOMPLETION=no \
               WITH_WGQUICK=no \
               WITH_SYSTEMDUNITS=no \
               -j"$(nproc)" wg V=1 \
          || make WITH_BASHCOMPLETION=no \
                  WITH_WGQUICK=no \
                  WITH_SYSTEMDUNITS=no \
                  -j"$(nproc)" V=1

          # Бинарь может называться wg или awg — ищем и нормализуем в awg
          BIN=$(find . -maxdepth 1 -type f \( -name 'awg' -o -name 'wg' \) | head -1)
          if [ -z "$BIN" ]; then
            echo "Бинарь wg/awg не найден в src/" >&2
            ls -la
            exit 1
          fi
          cp "$BIN" awg
          ls -lh awg
          file awg || true

      - name: Package
        run: |
          set -euo pipefail
          VER="${{ needs.resolve-versions.outputs.awg_tools_version }}"
          ARCH="${{ matrix.arch_name }}"
          mkdir -p package
          cp tools-src/src/awg package/
          (cd package && tar czf "../amneziawg-tools-${VER}-${ARCH}.tar.gz" awg)
          sha256sum "amneziawg-tools-${VER}-${ARCH}.tar.gz" \
            > "amneziawg-tools-${VER}-${ARCH}.tar.gz.sha256"
          ls -lh amneziawg-tools-*.tar.gz*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: awg-tools-${{ matrix.arch_name }}
          path: |
            amneziawg-tools-*.tar.gz
            amneziawg-tools-*.tar.gz.sha256
          retention-days: 14

  # ── 4. Публикация ──────────────────────────────────────────
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [resolve-versions, build-awg-go, build-awg-tools]
    if: |
      startsWith(github.ref, 'refs/tags/awg-bin-') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release == 'true')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Stage release files & build manifest
        id: stage
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) \
            -exec cp {} release/ \;
          ls -lh release/

          GO_VER="${{ needs.resolve-versions.outputs.awg_go_version }}"
          TOOLS_VER="${{ needs.resolve-versions.outputs.awg_tools_version }}"
          TAG="${GITHUB_REF#refs/tags/}"
          [ "$TAG" = "$GITHUB_REF" ] && TAG="manual-$(date -u +%Y%m%d%H%M%S)"

          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          python3 - "$GO_VER" "$TOOLS_VER" "$TAG" "$BASE_URL" <<'EOF' > release/manifest.json
          import json, os, sys, hashlib

          go_ver, tools_ver, tag, base = sys.argv[1:5]

          def sha(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(8192), b''):
                      h.update(chunk)
              return h.hexdigest()

          archs = ["mipsel-softfloat", "mips-softfloat", "aarch64", "armv7", "x86_64"]
          manifest = {
              "schema": 1,
              "tag": tag,
              "amneziawg_go":    {"version": go_ver,    "binaries": {}},
              "amneziawg_tools": {"version": tools_ver, "binaries": {}},
          }
          for arch in archs:
              for key, ver in (("amneziawg_go", go_ver), ("amneziawg_tools", tools_ver)):
                  short = "amneziawg-go" if key == "amneziawg_go" else "amneziawg-tools"
                  fname = f"{short}-{ver}-{arch}.tar.gz"
                  fpath = os.path.join("release", fname)
                  if os.path.exists(fpath):
                      manifest[key]["binaries"][arch] = {
                          "filename": fname,
                          "url": f"{base}/{fname}",
                          "sha256": sha(fpath),
                          "size": os.path.getsize(fpath),
                      }
          print(json.dumps(manifest, indent=2))
          EOF

          echo "── manifest.json ──"
          cat release/manifest.json
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stage.outputs.tag }}
          name: "AWG binaries ${{ steps.stage.outputs.tag }}"
          body: |
            Кросс-скомпилированные бинарники для роутеров и Linux.

            - amneziawg-go: `${{ needs.resolve-versions.outputs.awg_go_version }}`
            - amneziawg-tools: `${{ needs.resolve-versions.outputs.awg_tools_version }}`

            Архитектуры, размеры, sha256 и URL — в `manifest.json`.
          draft: false
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
