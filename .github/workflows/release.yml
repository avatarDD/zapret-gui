# ═══════════════════════════════════════════════════════════════
# release.yml — Автоматическая сборка и публикация релиза
#
# Запускается при пуше тега v* (например: git push origin v0.14.6)
# Версия берётся из тега — core/version.py синхронизируется автоматически.
#
# Артефакты релиза:
#   zapret-gui-X.Y.Z-keenetic.ipk  — для Keenetic / Entware
#   zapret-gui-X.Y.Z-openwrt.ipk   — для OpenWrt
#   zapret-gui-X.Y.Z-linux.tar.gz  — универсальный архив для Linux
# ═══════════════════════════════════════════════════════════════

name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PKG_NAME: zapret-gui

jobs:
  # ── 1. Проверка синтаксиса ───────────────────────────────────
  lint:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax (AST)
        run: |
          echo "── Проверка синтаксиса Python ──"
          errors=0
          for f in $(find . -name '*.py' -not -path './.git/*' -not -path './build/*' -not -path './dist/*'); do
            if ! python3 -c "import ast; ast.parse(open('$f').read())" 2>/dev/null; then
              echo "ОШИБКА: $f"
              python3 -c "import py_compile; py_compile.compile('$f', doraise=True)" 2>&1 || true
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Найдено ошибок: $errors"
            exit 1
          fi
          echo "✓ Все Python файлы корректны"

  # ── 2. Сборка пакетов ───────────────────────────────────────
  build:
    name: Build packages
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: sudo apt-get install -y build-essential make tar

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Тег: $TAG → Версия: $VERSION"

      # Версия берётся из тега — синхронизируем core/version.py автоматически
      - name: Sync core/version.py from tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/GUI_VERSION = .*/GUI_VERSION = \"$VERSION\"/" core/version.py
          echo "✓ core/version.py → $VERSION"

      # ── Сборка пакетов ──────────────────────────────────────

      - name: Build Keenetic / Entware ipk
        run: make ipk

      - name: Build OpenWrt ipk
        run: make openwrt-ipk

      - name: Create Linux archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="/tmp/${PKG_NAME}-${VERSION}-linux.tar.gz"
          tar czf "$ARCHIVE" \
            --exclude='.git' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.7z' \
            --exclude='.github' \
            .
          echo "✓ Архив: $(ls -lh $ARCHIVE)"

      # ── Именование артефактов ────────────────────────────────

      - name: Stage release artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-artifacts

          # Стабильные имена — не меняются между релизами.
          # README и /releases/latest/download/ всегда ссылаются на них.
          cp "dist/${PKG_NAME}_${VERSION}-1_all.ipk"     "release-artifacts/${PKG_NAME}-keenetic.ipk"
          cp "dist/${PKG_NAME}_${VERSION}-1_all.ipk"     "release-artifacts/${PKG_NAME}-entware.ipk"
          cp "dist/${PKG_NAME}_${VERSION}-1_openwrt.ipk" "release-artifacts/${PKG_NAME}-openwrt.ipk"
          cp "/tmp/${PKG_NAME}-${VERSION}-linux.tar.gz"  "release-artifacts/${PKG_NAME}-linux.tar.gz"

          echo "── Артефакты релиза ──"
          ls -lh release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          retention-days: 5
          path: release-artifacts/

  # ── 3. Публикация релиза ────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: ./artifacts

      - name: Extract changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## $TAG|^## v?$VERSION/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Релиз $TAG"
          fi
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Zapret Web-GUI ${{ steps.version.outputs.tag }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
