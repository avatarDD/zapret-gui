# ═══════════════════════════════════════════════════════════════
# release.yml — Автоматическая сборка и публикация релиза
# ═══════════════════════════════════════════════════════════════

name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PKG_NAME: zapret-gui

jobs:
  # ── 1. Проверка синтаксиса ───────────────────────────────────
  lint:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax (AST)
        run: |
          echo "── Проверка синтаксиса Python ──"
          errors=0
          for f in $(find . -name '*.py' -not -path './.git/*' -not -path './build/*' -not -path './dist/*'); do
            if ! python3 -c "import ast; ast.parse(open('$f').read())" 2>/dev/null; then
              echo "ОШИБКА: $f"
              python3 -c "import py_compile; py_compile.compile('$f', doraise=True)" 2>&1 || true
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Найдено ошибок: $errors"
            exit 1
          fi
          echo "✓ Все Python файлы корректны"

  # ── 2. Сборка пакетов ───────────────────────────────────────
  build:
    name: Build packages
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential make tar

      # Извлекаем версию из тега
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Тег: $TAG, Версия: $VERSION"

      # Проверка версии (core/version.py должна совпадать с тегом)
      - name: Verify version consistency
        run: |
          TAG_VER="${{ steps.version.outputs.version }}"
          FAIL=0

          if [ -f core/version.py ]; then
            CODE_VER=$(grep -oP 'GUI_VERSION\s*=\s*["\x27]\K[^"\x27]+' core/version.py || true)
            if [ -n "$CODE_VER" ] && [ "$CODE_VER" != "$TAG_VER" ]; then
              echo "❌ core/version.py ($CODE_VER) ≠ тег ($TAG_VER)"
              FAIL=1
            else
              echo "✓ core/version.py: $CODE_VER"
            fi
          fi

          if [ -f Makefile ]; then
            MK_VER=$(grep -oP '^PKG_VERSION\s*:=\s*\K\S+' Makefile || true)
            if [ -n "$MK_VER" ] && [ "$MK_VER" != "$TAG_VER" ]; then
              echo "⚠ Makefile ($MK_VER) ≠ тег ($TAG_VER) — сборка использует версию тега"
            else
              echo "✓ Makefile: $MK_VER"
            fi
          fi

          [ "$FAIL" -eq 0 ] || exit 1

      # Сборка пакетов (версия берётся из тега, не из Makefile)
      - name: Build Entware ipk
        run: make ipk PKG_VERSION=${{ steps.version.outputs.version }}

      - name: Build OpenWrt ipk
        run: make openwrt-ipk PKG_VERSION=${{ steps.version.outputs.version }}

      # ✅ ИСПРАВЛЕНО: архив создаётся вне проекта
      - name: Create source archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="/tmp/${PKG_NAME}-${VERSION}.tar.gz"

          tar czf "$ARCHIVE" \
            --exclude='.git' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.7z' \
            --exclude='.github' \
            .

          mv "$ARCHIVE" .
          FINAL_ARCHIVE="${PKG_NAME}-${VERSION}.tar.gz"

          echo "✓ Архив: $FINAL_ARCHIVE"
          ls -lh "$FINAL_ARCHIVE"

      # Стабильно-именованные копии для README-ссылок
      - name: Create stable-named artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp "dist/zapret-gui_${VERSION}-1_all.ipk"     dist/zapret-gui-entware.ipk
          cp "dist/zapret-gui_${VERSION}-1_all.ipk"     dist/zapret-gui-keenetic.ipk
          cp "dist/zapret-gui_${VERSION}-1_openwrt.ipk" dist/zapret-gui-openwrt.ipk

      # Артефакты
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          retention-days: 5
          path: |
            dist/*.ipk
            ${{ env.PKG_NAME }}-${{ steps.version.outputs.version }}.tar.gz

  # ── 3. Публикация релиза ────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: ./artifacts

      # Changelog
      - name: Extract changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            TAG="${{ steps.version.outputs.tag }}"
            VERSION="${{ steps.version.outputs.version }}"
            NOTES=$(awk "/^## $TAG|^## v?$VERSION/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
            if [ -z "$NOTES" ]; then
              NOTES="Релиз $TAG"
            fi
          else
            NOTES="Релиз ${{ steps.version.outputs.tag }}"
          fi

          echo "$NOTES" > /tmp/release_notes.md

      # Релиз
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Zapret Web-GUI ${{ steps.version.outputs.tag }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            artifacts/dist/*.ipk
            artifacts/${{ env.PKG_NAME }}-${{ steps.version.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}