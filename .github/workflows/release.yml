# ═══════════════════════════════════════════════════════════════
# release.yml — Автоматическая сборка и публикация релиза
# ═══════════════════════════════════════════════════════════════

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  # Ручной запуск: позволяет пересобрать релиз без пересоздания тега
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег для релиза (например: v0.14.4)'
        required: true
        type: string

permissions:
  contents: write

env:
  PKG_NAME: zapret-gui

jobs:
  # ── 1. Проверка синтаксиса ───────────────────────────────────
  lint:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax (AST)
        run: |
          echo "── Проверка синтаксиса Python ──"
          errors=0
          for f in $(find . -name '*.py' -not -path './.git/*' -not -path './build/*' -not -path './dist/*'); do
            if ! python3 -c "import ast; ast.parse(open('$f').read())" 2>/dev/null; then
              echo "ОШИБКА: $f"
              python3 -c "import py_compile; py_compile.compile('$f', doraise=True)" 2>&1 || true
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Найдено ошибок: $errors"
            exit 1
          fi
          echo "✓ Все Python файлы корректны"

  # ── 2. Сборка пакетов ───────────────────────────────────────
  build:
    name: Build packages
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential make tar

      # Извлекаем версию из тега или из входного параметра
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Тег: $TAG, Версия: $VERSION"

      # Патчим версионные файлы из тега — workflow не зависит от ручного бампа
      - name: Patch version files
        run: |
          TAG_VER="${{ steps.version.outputs.version }}"

          if [ -f core/version.py ]; then
            sed -i "s/GUI_VERSION = .*/GUI_VERSION = \"$TAG_VER\"/" core/version.py
            echo "✓ core/version.py → $TAG_VER"
          fi

          if [ -f Makefile ]; then
            sed -i "s/^PKG_VERSION\s*:=.*/PKG_VERSION  := $TAG_VER/" Makefile
            echo "✓ Makefile → $TAG_VER"
          fi

          if [ -f install.sh ]; then
            sed -i "s/^VERSION=.*/VERSION=\"$TAG_VER\"/" install.sh
            echo "✓ install.sh → $TAG_VER"
          fi

      # Сборка пакетов
      - name: Build Entware ipk
        run: make ipk PKG_VERSION=${{ steps.version.outputs.version }}

      - name: Build OpenWrt ipk
        run: make openwrt-ipk PKG_VERSION=${{ steps.version.outputs.version }}

      # Исходный архив создаётся вне директории проекта во избежание рекурсии
      - name: Create source archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="/tmp/${PKG_NAME}-${VERSION}.tar.gz"

          tar czf "$ARCHIVE" \
            --exclude='.git' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.7z' \
            --exclude='.github' \
            .

          mv "$ARCHIVE" .
          echo "✓ Архив: ${PKG_NAME}-${VERSION}.tar.gz"
          ls -lh "${PKG_NAME}-${VERSION}.tar.gz"

      # Стабильно-именованные копии для README-ссылок
      - name: Create stable-named artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp "dist/zapret-gui_${VERSION}-1_all.ipk"     dist/zapret-gui-entware.ipk
          cp "dist/zapret-gui_${VERSION}-1_all.ipk"     dist/zapret-gui-keenetic.ipk
          cp "dist/zapret-gui_${VERSION}-1_openwrt.ipk" dist/zapret-gui-openwrt.ipk

      # Артефакты
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          retention-days: 5
          path: |
            dist/*.ipk
            ${{ env.PKG_NAME }}-${{ steps.version.outputs.version }}.tar.gz

  # ── 3. Публикация релиза ────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: ./artifacts

      # Changelog
      - name: Extract changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            TAG="${{ steps.version.outputs.tag }}"
            VERSION="${{ steps.version.outputs.version }}"
            NOTES=$(awk "/^## $TAG|^## v?$VERSION/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
            if [ -z "$NOTES" ]; then
              NOTES="Релиз $TAG"
            fi
          else
            NOTES="Релиз ${{ steps.version.outputs.tag }}"
          fi
          echo "$NOTES" > /tmp/release_notes.md

      # Релиз — tag_name задаётся явно для поддержки workflow_dispatch
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Zapret Web-GUI ${{ steps.version.outputs.tag }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            artifacts/dist/*.ipk
            artifacts/${{ env.PKG_NAME }}-${{ steps.version.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
