# ═══════════════════════════════════════════════════════════════
# release.yml — Автоматическая сборка и публикация релиза
# ═══════════════════════════════════════════════════════════════
#
# Триггер: push тега вида v*  (например v0.14.0, v0.15.0-beta1)
#
# Что делает:
#   1. Lint — проверка синтаксиса Python
#   2. Build — сборка ipk (Entware + OpenWrt) и tar.gz архива
#   3. Release — создание GitHub Release с артефактами
#
# Использование:
#   git tag v0.15.0
#   git push origin v0.15.0
#
# ═══════════════════════════════════════════════════════════════

name: Build & Release

on:
  push:
    tags:
      - 'v*'

# Разрешения для создания релизов
permissions:
  contents: write

env:
  PKG_NAME: zapret-gui

jobs:
  # ── 1. Проверка синтаксиса ───────────────────────────────────
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax (AST)
        run: |
          echo "── Проверка синтаксиса Python ──"
          errors=0
          for f in $(find . -name '*.py' -not -path './.git/*' -not -path './build/*' -not -path './dist/*'); do
            if ! python3 -c "import ast; ast.parse(open('$f').read())" 2>/dev/null; then
              echo "ОШИБКА: $f"
              python3 -c "import py_compile; py_compile.compile('$f', doraise=True)" 2>&1 || true
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Найдено ошибок: $errors"
            exit 1
          fi
          echo "✓ Все Python файлы корректны"

  # ── 2. Сборка пакетов ───────────────────────────────────────
  build:
    name: Build packages
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Извлекаем версию из тега (v0.14.0 → 0.14.0)
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Тег: $TAG, Версия: $VERSION"

      # Проверяем соответствие версии в коде и теге
      - name: Verify version consistency
        run: |
          TAG_VER="${{ steps.version.outputs.version }}"

          # Проверяем core/version.py
          if [ -f core/version.py ]; then
            CODE_VER=$(grep -oP 'GUI_VERSION\s*=\s*["\x27]\K[^"\x27]+' core/version.py || true)
            if [ -n "$CODE_VER" ] && [ "$CODE_VER" != "$TAG_VER" ]; then
              echo "⚠ ПРЕДУПРЕЖДЕНИЕ: core/version.py ($CODE_VER) ≠ тег ($TAG_VER)"
              echo "  Обновите GUI_VERSION перед релизом!"
            fi
          fi

          # Проверяем Makefile
          if [ -f Makefile ]; then
            MK_VER=$(grep -oP '^PKG_VERSION\s*:=\s*\K\S+' Makefile || true)
            if [ -n "$MK_VER" ] && [ "$MK_VER" != "$TAG_VER" ]; then
              echo "⚠ ПРЕДУПРЕЖДЕНИЕ: Makefile ($MK_VER) ≠ тег ($TAG_VER)"
            fi
          fi

      # Сборка Entware ipk
      - name: Build Entware ipk
        run: make ipk

      # Сборка OpenWrt ipk
      - name: Build OpenWrt ipk
        run: make openwrt-ipk

      # Собираем tar.gz архив исходников (без build/dist/.git)
    - name: Create source archive
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        ARCHIVE="/tmp/${PKG_NAME}-${VERSION}.tar.gz"

        tar czf "$ARCHIVE" \
          --exclude='.git' \
          --exclude='build' \
          --exclude='dist' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='*.7z' \
          --exclude='.github' \
          .

        mv "$ARCHIVE" .
        echo "✓ Архив: $(basename $ARCHIVE)"
        ls -lh "$(basename $ARCHIVE)"
        
      # Загружаем артефакты
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          retention-days: 5
          path: |
            dist/*.ipk
            ${{ env.PKG_NAME }}-${{ steps.version.outputs.version }}.tar.gz

  # ── 3. Публикация релиза ────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout (для CHANGELOG)
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Скачиваем собранные пакеты
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: ./artifacts

      # Извлекаем changelog для текущей версии
      - name: Extract changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Извлекаем секцию текущей версии
            TAG="${{ steps.version.outputs.tag }}"
            VERSION="${{ steps.version.outputs.version }}"
            NOTES=$(awk "/^## $TAG|^## v?$VERSION/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
            if [ -z "$NOTES" ]; then
              NOTES="Релиз $TAG"
            fi
          else
            NOTES="Релиз ${{ steps.version.outputs.tag }}"
          fi

          # Записываем в файл (multiline safe)
          echo "$NOTES" > /tmp/release_notes.md

          # Добавляем инструкции по установке
          {
            echo ""
            echo "---"
            echo ""
            echo "### Установка"
            echo ""
            echo "**Entware (Keenetic):**"
            echo '```bash'
            echo "wget https://github.com/avatarDD/zapret-gui/releases/latest/download/zapret-gui_${VERSION}-1_all.ipk"
            echo "opkg install zapret-gui_${VERSION}-1_all.ipk"
            echo "/opt/etc/init.d/S99zapret-gui start"
            echo '```'
            echo ""
            echo "**OpenWrt:**"
            echo '```bash'
            echo "wget https://github.com/avatarDD/zapret-gui/releases/latest/download/zapret-gui_${VERSION}-1_openwrt.ipk"
            echo "opkg install zapret-gui_${VERSION}-1_openwrt.ipk"
            echo "/etc/init.d/zapret-gui start"
            echo '```'
            echo ""
            echo "**Скриптом:**"
            echo '```bash'
            echo "wget -O - https://raw.githubusercontent.com/avatarDD/zapret-gui/main/install.sh | sh"
            echo '```'
          } >> /tmp/release_notes.md

      # Создаём релиз
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Zapret Web-GUI ${{ steps.version.outputs.tag }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            artifacts/dist/*.ipk
            artifacts/${{ env.PKG_NAME }}-${{ steps.version.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
