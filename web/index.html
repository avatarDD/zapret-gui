<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Масштабирование не запрещаем: pinch-zoom полезен на плотных таблицах;
         автозум iOS при фокусе полей убран через font-size:16px (pointer:coarse). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1117">
    <title>Zapret GUI</title>
    <!-- Применяем тему до отрисовки, чтобы не было «вспышки» тёмного. -->
    <script>
      try {
        var _t = localStorage.getItem('zapret-gui-theme');
        document.documentElement.setAttribute(
          'data-theme', (_t === 'light' || _t === 'dark') ? _t : 'dark');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    </script>
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/blockcheck_scan.css">
</head>
<body>
    <div id="app">
        <!-- Мобильная шапка: бургер + название раздела (видна только на ≤768px) -->
        <header id="mobile-topbar" class="mobile-topbar">
            <button id="mobile-burger" class="mobile-burger" aria-label="Открыть меню"
                    aria-controls="sidebar" aria-expanded="false">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <span id="mobile-topbar-title" class="mobile-topbar-title">Zapret GUI</span>
        </header>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                <div class="sidebar-title">
                    <span class="sidebar-title-text">Zapret</span>
                    <span class="sidebar-subtitle">Web GUI</span>
                </div>
                <!-- На мобильных меню видно только открытым, так что эта
                     кнопка всегда означает «закрыть» — крестик. -->
                <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Закрыть меню">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <div class="sidebar-nav" id="sidebar-nav">
                <!-- Заполняется из JS -->
            </div>

            <div class="sidebar-footer">
                <div class="sidebar-version" id="sidebar-version">...</div>
                <label class="expert-toggle" id="expert-toggle"
                       title="Режим эксперта — показать расширенные настройки во всех разделах">
                    <input type="checkbox" onchange="Expert.set(this.checked)">
                    <span>эксперт</span>
                </label>
                <button id="theme-toggle" class="theme-toggle" title="Тема"
                        onclick="Theme.toggle()"></button>
            </div>
        </nav>

        <!-- Затемнение контента под открытым мобильным меню
             (должно идти сразу за sidebar — показывается CSS-селектором
             .sidebar.open + .sidebar-backdrop) -->
        <div id="sidebar-backdrop" class="sidebar-backdrop" aria-hidden="true"></div>

        <!-- Основной контент -->
        <main id="content" class="content">
            <div id="page-container" class="page-container">
                <!-- Страницы рендерятся сюда -->
                <div class="page-loading">
                    <div class="spinner"></div>
                    <span>Загрузка...</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast уведомления -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Модальные окна -->
    <div id="modal-overlay" class="modal-overlay hidden"></div>

    <!-- JS модули -->
    <script src="/js/api.js"></script>
    <script src="/js/utils/debounce.js"></script>
    <script src="/js/utils/nfqws2_spec.js"></script>
    <script src="/js/utils/nfqws2_lint.js"></script>
    <script src="/js/utils/syntax.js"></script>
    <script src="/js/utils/lua_syntax.js"></script>
    <script src="/js/utils/autocomplete.js"></script>
    <script src="/js/components/toast.js"></script>
    <script src="/js/components/theme.js"></script>
    <script src="/js/components/expert.js"></script>
    <script src="/js/components/sidebar.js"></script>
    <script src="/js/components/list_ui.js"></script>
    <script src="/js/components/sparkline.js"></script>
    <script src="/js/components/help.js"></script>
    <script src="/js/components/transport_select.js"></script>
    <script src="/js/components/setup_ui.js"></script>
    <script src="/js/components/proxy_table.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/control.js"></script>
    <script src="/js/pages/strategies.js"></script>
    <script src="/js/pages/hostlists.js"></script>
    <script src="/js/pages/ipsets.js"></script>
    <script src="/js/pages/lua_scripts.js"></script>
    <script src="/js/pages/blobs.js"></script>
    <script src="/js/pages/hosts.js"></script>
    <script src="/js/pages/diagnostics.js"></script>
    <script src="/js/pages/blockcheck.js"></script>
    <script src="/js/pages/blockcheck2.js"></script>
    <script src="/js/pages/scan.js"></script>
    <script src="/js/pages/logs.js"></script>
    <script src="/js/pages/autostart.js"></script>
    <script src="/js/pages/zapret_manager.js"></script>
    <script src="/js/pages/awg_setup.js"></script>
    <script src="/js/pages/awg_dashboard.js"></script>
    <script src="/js/pages/awg_configs.js"></script>
    <script src="/js/pages/awg_warp.js"></script>
    <script src="/js/pages/awg_routing.js"></script>
    <script src="/js/pages/singbox.js"></script>
    <script src="/js/pages/singbox_configs.js"></script>
    <script src="/js/pages/singbox_proxies.js"></script>
    <script src="/js/pages/singbox_setup.js"></script>
    <script src="/js/pages/mihomo.js"></script>
    <script src="/js/pages/mihomo_proxies.js"></script>
    <script src="/js/pages/mihomo_setup.js"></script>
    <script src="/js/pages/lists.js"></script>
    <script src="/js/pages/routing_unified.js"></script>
    <script src="/js/pages/settings.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
